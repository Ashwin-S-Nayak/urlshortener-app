server {
    listen 80;
    server_name _;

    # All /api/* requests go to the private backend server
    location /api/ {
        proxy_pass http://10.0.128.172:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Short code redirect routes also go to backend
    # These are paths like /aB3xKp that need to redirect
    location ~ ^/[a-zA-Z0-9_-]{3,20}$ {
        proxy_pass http://10.0.128.172:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else goes to the React frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
